<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레인보우 스케치북 — 토슴이 그림책 v0.6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    color: #fff;
    user-select: none;
    background: #0F0820;
  }

  /* ===== 세로 모드 (터치 디바이스만) ===== */
  .rotate-notice { display: none; }
  @media (orientation: portrait) and (pointer: coarse) and (hover: none) {
    .rotate-notice {
      display: flex;
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #4A2D6E, #2C1B47);
      align-items: center; justify-content: center; flex-direction: column;
      text-align: center; padding: 40px;
    }
    .rotate-notice .phone { font-size: 80px; animation: rotate 2s ease-in-out infinite; margin-bottom: 24px; }
    @keyframes rotate { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-90deg)} }
    .stage { display: none; }
  }

  .stage {
    position: fixed; inset: 0;
    overflow: hidden;
    background: #0F0820;
  }

  /* ===== 슬라이드 공통 ===== */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease-in-out;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide.active .scene-bg { animation: bgIn 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  @keyframes bgIn {
    0% { transform: scale(1.06); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ===== 배경 이미지 (ChatGPT가 만든 5컷 일러스트) ===== */
  .scene-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* 이미지 없을 때 fallback 그라데이션 + placeholder 메시지 */
  .scene-bg.no-image {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: linear-gradient(135deg, #4A2D6E, #2C1B47);
  }
  .scene-bg.no-image::after {
    content: attr(data-placeholder);
    color: rgba(255,255,255,0.4);
    font-size: 16px;
    text-align: center;
    line-height: 1.6;
    font-weight: 700;
    background: rgba(0,0,0,0.4);
    padding: 24px 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 2px dashed rgba(255,255,255,0.3);
    max-width: 70%;
  }

  /* 어두운 오버레이 (텍스트 가독성) */
  .scene-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.15) 70%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* ===== 텍스트 박스 (대사) ===== */
  .text-box {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    max-width: 80%;
    text-align: center;
    z-index: 10;
    padding: 24px 36px;
  }
  .narration {
    font-size: clamp(24px, 3.2vw, 40px);
    color: #fff;
    font-weight: 800;
    line-height: 1.5;
    letter-spacing: 1px;
    text-shadow:
      0 0 24px rgba(0,0,0,0.8),
      0 2px 8px rgba(0,0,0,0.7);
    animation: textFadeUp 1.5s ease-out 0.6s both;
  }
  @keyframes textFadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* 토슴이 1인칭 대사 (말풍선 스타일) */
  .speech {
    display: inline-block;
    background: rgba(255, 255, 255, 0.97);
    color: #5A2A40;
    padding: 18px 32px;
    border-radius: 28px;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 800;
    line-height: 1.5;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 60px rgba(255,200,220,0.2);
    text-shadow: none;
    position: relative;
    animation: speechPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }
  .speech::before {
    content: '';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    border: 12px solid transparent;
    border-bottom-color: rgba(255, 255, 255, 0.97);
  }
  @keyframes speechPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 강조 키워드 */
  .highlight-rainbow {
    background: linear-gradient(90deg, #FF6B9D, #FFB347, #FFE066, #95E1D3, #B19CFF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
  }
  .highlight-pink { color: #FFB6C8; font-weight: 900; }
  .highlight-yellow { color: #FFD93D; font-weight: 900; }
  .highlight-cry { color: #FFE066; font-weight: 900; font-size: 1.3em; display: inline-block; animation: shake 0.4s ease-in-out 2s 2; }
  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  /* ===== 별빛 (전 화면 공통) ===== */
  .stars { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ===== 컨트롤 ===== */
  .controls {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 36px;
    z-index: 100;
    pointer-events: none;
  }
  .controls > * { pointer-events: auto; }
  .controls.hide { opacity: 0; pointer-events: none; }
  .indicator {
    display: flex; gap: 8px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 30px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.4s;
  }
  .dot.active {
    background: #FFD93D;
    width: 28px; border-radius: 6px;
  }
  .nav-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .skip-btn {
    position: absolute;
    top: 24px; right: 24px;
    z-index: 100;
    padding: 10px 20px;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
  }
  .skip-btn.hide { display: none; }
  .skip-btn:hover { background: rgba(0,0,0,0.7); }

  /* ===== 타이틀 스플래시 ===== */
  .scene-splash {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background:
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(180, 140, 255, 0.4) 0%, transparent 70%),
      linear-gradient(180deg, #1A0F3E 0%, #0F0820 100%);
  }
  .scene-splash .title-toseumi {
    height: 38vh;
    object-fit: contain;
    filter: drop-shadow(0 0 60px rgba(255, 200, 230, 0.5));
    animation: titleEnter 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both,
               toseumiFloat 3s ease-in-out infinite 1.5s;
  }
  @keyframes titleEnter {
    0% { transform: translateY(40px) scale(0.7); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes toseumiFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .scene-splash .game-title {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 3px;
    margin-top: 20px;
    background: linear-gradient(90deg, #FFB6C8, #FFD93D, #B8F0DD, #B19CFF, #FFB6C8);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 3s linear infinite,
               titleEnter 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s both;
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .scene-splash .subtitle {
    font-size: clamp(15px, 1.8vw, 22px);
    color: #FFE4EC;
    opacity: 0.9;
    margin-top: 12px;
    letter-spacing: 1.5px;
    animation: textFadeUp 1s ease-out 1.4s both;
  }
  .scene-splash .start-btn {
    margin-top: 36px;
    padding: 20px 64px;
    font-size: clamp(20px, 2.2vw, 28px);
    font-weight: 900;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #FF8FB1, #B19CFF, #7FD8C0);
    background-size: 200% auto;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 0 #6B47A8, 0 14px 30px rgba(0,0,0,0.3);
    transition: all 0.15s;
    animation: shimmer 4s linear infinite,
               titleEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.8s both;
  }
  .scene-splash .start-btn:hover { transform: translateY(-2px); }
  .scene-splash .start-btn:active {
    transform: translateY(8px);
    box-shadow: 0 2px 0 #6B47A8, 0 4px 10px rgba(0,0,0,0.3);
  }

  .debug {
    position: fixed; top: 4px; left: 8px;
    font-size: 10px; opacity: 0.4; color: #fff;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="rotate-notice">
  <div class="phone">📱</div>
  <h2 style="font-size:24px;margin-bottom:8px;">화면을 가로로 돌려주세요!</h2>
  <p style="font-size:16px;opacity:0.8;">레인보우 스케치북은 가로 모드에서 가장 예뻐요 🌈</p>
</div>

<div class="stage">
  <div class="stars" id="stars"></div>

  <button class="skip-btn" onclick="skipToEnd()" id="skipBtn">건너뛰기 →</button>

  <!-- ===== 컷 1 ===== -->
  <div class="slide active" data-page="1">
    <div class="scene-bg" data-img="story-01-rainbow-starland.png"
         data-placeholder="🌌 컷 1 이미지 자리&#10;ChatGPT에서 받아온&#10;'story-01-rainbow-starland.png'를&#10;assets/story/ 폴더에 저장하세요"></div>
    <div class="scene-overlay"></div>
    <div class="text-box">
      <div class="narration">
        옛날 옛날, 우주에는<br>
        <span class="highlight-rainbow">레인보우 별나라</span>가 있었어요 🌌
      </div>
    </div>
  </div>

  <!-- ===== 컷 2 ===== -->
  <div class="slide" data-page="2">
    <div class="scene-bg" data-img="story-02-toseumi-home.png"
         data-placeholder="🐰 컷 2 이미지 자리&#10;'story-02-toseumi-home.png'를&#10;assets/story/ 폴더에 저장"></div>
    <div class="scene-overlay"></div>
    <div class="text-box">
      <div class="narration">
        그 별나라엔 폭신폭신한<br>
        토끼 <span class="highlight-pink">토슴이</span>가 살았어요 🐰
      </div>
    </div>
  </div>

  <!-- ===== 컷 3 ===== -->
  <div class="slide" data-page="3">
    <div class="scene-bg" data-img="story-03-color-gone.png"
         data-placeholder="💧 컷 3 이미지 자리&#10;'story-03-color-gone.png'를&#10;assets/story/ 폴더에 저장"></div>
    <div class="scene-overlay"></div>
    <div class="text-box">
      <div class="narration">
        어느 날, 별나라의<br>
        <span style="color:#999;">색이 모두 사라졌어요</span>!
      </div>
    </div>
  </div>

  <!-- ===== 컷 4 (토슴이 1인칭 대사) ===== -->
  <div class="slide" data-page="4">
    <div class="scene-bg" data-img="story-04-toseumi-crying.png"
         data-placeholder="😢 컷 4 이미지 자리&#10;'story-04-toseumi-crying.png'를&#10;assets/story/ 폴더에 저장"></div>
    <div class="scene-overlay"></div>
    <div class="text-box">
      <div class="speech">
        <span class="highlight-cry">으앙!</span><br>
        내 크레파스들이<br>
        다 어디갔지? 😭
      </div>
    </div>
  </div>

  <!-- ===== 컷 5 (토슴이 1인칭 대사) ===== -->
  <div class="slide" data-page="5">
    <div class="scene-bg" data-img="story-05-toseumi-asking.png"
         data-placeholder="✨ 컷 5 이미지 자리&#10;'story-05-toseumi-asking.png'를&#10;assets/story/ 폴더에 저장"></div>
    <div class="scene-overlay"></div>
    <div class="text-box">
      <div class="speech">
        나랑 같이<br>
        별나라 <span class="highlight-rainbow">색깔들</span>을<br>
        찾으러 가줄래? 🎨
      </div>
    </div>
  </div>

  <!-- ===== 타이틀 스플래시 ===== -->
  <div class="slide" data-page="6">
    <div class="scene-splash">
      <img class="title-toseumi" src="../assets/characters/toseumi-hero.png" alt="토슴이">
      <div class="game-title">🌈 레인보우 스케치북</div>
      <div class="subtitle">토슴이와 함께하는 우주 그림 놀이</div>
      <button class="start-btn" onclick="startGame()">시작하기 ✨</button>
    </div>
  </div>

  <!-- ===== 컨트롤 ===== -->
  <div class="controls" id="controls">
    <button class="nav-btn" onclick="prevSlide()" id="prevBtn" disabled>‹</button>
    <div class="indicator" id="indicator">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="nav-btn" onclick="nextSlide()" id="nextBtn">›</button>
  </div>

  <div class="debug">v0.6 · storybook (new copy + image slots)</div>
</div>

<script>
  // ===== 별빛 자동 생성 =====
  const stars = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDuration = (2 + Math.random() * 4) + 's';
    s.style.animationDelay = Math.random() * 4 + 's';
    stars.appendChild(s);
  }

  // ===== 이미지 자동 로드 (있으면 사용, 없으면 placeholder) =====
  document.querySelectorAll('.scene-bg[data-img]').forEach(bg => {
    const imgName = bg.dataset.img;
    const imgPath = `../assets/story/${imgName}`;
    const testImg = new Image();
    testImg.onload = () => {
      bg.style.backgroundImage = `url('${imgPath}')`;
      bg.classList.remove('no-image');
    };
    testImg.onerror = () => {
      bg.classList.add('no-image');
    };
    testImg.src = imgPath;
  });

  // ===== 슬라이드 컨트롤 =====
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.indicator .dot');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const controls = document.getElementById('controls');
  const skipBtn = document.getElementById('skipBtn');

  let current = 0;
  const STORY_LENGTH = 5;
  const TOTAL = slides.length; // 6
  let autoTimer = null;

  function showSlide(i) {
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));

    if (i < STORY_LENGTH) {
      dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    }

    if (i === STORY_LENGTH) {
      controls.classList.add('hide');
      skipBtn.classList.add('hide');
      clearTimeout(autoTimer);
    } else {
      controls.classList.remove('hide');
      skipBtn.classList.remove('hide');
      prevBtn.disabled = (i === 0);
      nextBtn.disabled = false;

      // 페이지마다 다른 호흡
      const durations = [6500, 6500, 6000, 7500, 8000];
      clearTimeout(autoTimer);
      autoTimer = setTimeout(() => {
        if (current === i) nextSlide();
      }, durations[i] || 7000);
    }
    current = i;
  }

  function nextSlide() { if (current < TOTAL - 1) showSlide(current + 1); }
  function prevSlide() { if (current > 0) showSlide(current - 1); }
  function skipToEnd() { showSlide(STORY_LENGTH); }
  function startGame() {
    window.location.href = '03-main-real-toseumi.html';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
    if (e.key === 'ArrowLeft') prevSlide();
    if (e.key === 'Escape') skipToEnd();
  });

  document.querySelector('.stage').addEventListener('click', (e) => {
    if (e.target.closest('button') || e.target.closest('.indicator')) return;
    if (current < STORY_LENGTH) nextSlide();
  });

  showSlide(0);
</script>

</body>
</html>
